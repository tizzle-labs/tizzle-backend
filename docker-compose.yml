version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tizzle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tizzle_db
      POSTGRES_USER: tizzle
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tizzle']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tizzle-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (optional - for full stack development)
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: tizzle-backend
  #   restart: unless-stopped
  #   ports:
  #     - '3000:3000'
  #   environment:
  #     NODE_ENV: development
  #     DATABASE_URL: postgresql://tizzle:password@postgres:5432/tizzle_db
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - .:/app
  #     - /app/node_modules

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: tizzle-network
